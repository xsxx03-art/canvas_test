<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>canvas_test</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/reactflow@11/dist/umd/index.js" crossorigin></script>
  <link rel="stylesheet" href="https://unpkg.com/reactflow@11/dist/style.css" />
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body, html, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
    details { margin-left: 8px; }
    summary { cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;
    const { 
      ReactFlow, 
      ReactFlowProvider,
      useNodesState, 
      useEdgesState, 
      Controls, 
      Background, 
      useReactFlow,
      addEdge,
      Handle,
      Position,
    } = window.ReactFlow;

    // Custom node with four connection areas on the left and right sides,
    // each biased toward the top or bottom of the node.
    // Each area has both a source and a target handle, allowing bidirectional connections.
    const CustomNode = ({ id, data }) => {
      const baseHandleStyle = {
        width: 10,
        height: 10,
        background: '#555',
        border: '2px solid #fff',
        borderRadius: '50%',
      };

      // Left side, near the top
      const leftTopPortStyle = { ...baseHandleStyle, top: '25%', transform: 'translate(-50%, -50%)' };
      // Left side, near the bottom
      const leftBottomPortStyle = { ...baseHandleStyle, top: '75%', transform: 'translate(-50%, -50%)' };
      // Right side, near the top
      const rightTopPortStyle = { ...baseHandleStyle, top: '25%', transform: 'translate(50%, -50%)' };
      // Right side, near the bottom
      const rightBottomPortStyle = { ...baseHandleStyle, top: '75%', transform: 'translate(50%, -50%)' };

      return (
        <div style={{
          padding: '10px 20px',
          border: '1px solid #333',
          borderRadius: 6,
          background: '#fff',
          minWidth: 100,
          textAlign: 'center',
          position: 'relative',
        }}>
          <div>{data.label}</div>

          {/* Left-top pair */}
          <Handle type="source" position={Position.Left} id="port-lt-source" style={{ ...leftTopPortStyle, zIndex: 10 }} />
          <Handle type="target" position={Position.Left} id="port-lt-target" style={{ ...leftTopPortStyle, zIndex: 5 }} />

          {/* Left-bottom pair */}
          <Handle type="source" position={Position.Left} id="port-lb-source" style={{ ...leftBottomPortStyle, zIndex: 10 }} />
          <Handle type="target" position={Position.Left} id="port-lb-target" style={{ ...leftBottomPortStyle, zIndex: 5 }} />

          {/* Right-top pair */}
          <Handle type="source" position={Position.Right} id="port-rt-source" style={{ ...rightTopPortStyle, zIndex: 10 }} />
          <Handle type="target" position={Position.Right} id="port-rt-target" style={{ ...rightTopPortStyle, zIndex: 5 }} />

          {/* Right-bottom pair */}
          <Handle type="source" position={Position.Right} id="port-rb-source" style={{ ...rightBottomPortStyle, zIndex: 10 }} />
          <Handle type="target" position={Position.Right} id="port-rb-target" style={{ ...rightBottomPortStyle, zIndex: 5 }} />
        </div>
      );
    };

    const nodeTypes = {
      custom: CustomNode,
    };

    function App() {
      const [nodes, setNodes, onNodesChange] = useNodesState([]);
      const [edges, setEdges, onEdgesChange] = useEdgesState([]);
      const reactFlowInstance = useReactFlow();

      // Currently selected node
      const selectedNode = nodes.find(n => n.selected);

      const onDragOver = useCallback((event) => {
        event.preventDefault();
        event.dataTransfer.dropEffect = 'move';
      }, []);

      const onDrop = useCallback((event) => {
        event.preventDefault();
        const type = event.dataTransfer.getData('application/reactflow');
        if (!type) return;

        const position = reactFlowInstance.screenToFlowPosition({
          x: event.clientX,
          y: event.clientY,
        });

        const newNode = {
          id: Date.now().toString(),
          type: 'custom',   // Use custom node with four directional handles
          position,
          data: { label: type },
        };
        setNodes((nds) => nds.concat(newNode));
      }, [setNodes, reactFlowInstance]);

      const onConnect = useCallback((connection) => {
        setEdges((eds) => addEdge(connection, eds));
      }, [setEdges]);

      // Update position of selected node
      const updateNodePosition = useCallback((id, axis, value) => {
        setNodes((nds) =>
          nds.map((node) =>
            node.id === id
              ? { ...node, position: { ...node.position, [axis]: parseFloat(value) || 0 } }
              : node
          )
        );
      }, [setNodes]);

      return (
        <div style={{ display: 'flex', width: '100%', height: '100%' }}>
          {/* Left sidebar: component library */}
          <aside style={{ width: 220, background: '#f0f0f0', borderRight: '1px solid #ccc', padding: 10, overflowY: 'auto' }}>
            <h3>Library</h3>
            
            <details open>
              <summary>1</summary>
              <div
                draggable
                onDragStart={(e) => {
                  e.dataTransfer.setData('application/reactflow', 'component A');
                  e.dataTransfer.effectAllowed = 'move';
                }}
                style={{ background: 'white', border: '1px solid #999', padding: 6, margin: '4px 0', cursor: 'grab' }}
              >
                component A
              </div>
            </details>

            <details open>
              <summary>2</summary>
              <div
                draggable
                onDragStart={(e) => {
                  e.dataTransfer.setData('application/reactflow', 'component B');
                  e.dataTransfer.effectAllowed = 'move';
                }}
                style={{ background: 'white', border: '1px solid #999', padding: 6, margin: '4px 0', cursor: 'grab' }}
              >
                component B
              </div>
            </details>
          </aside>

          {/* Main canvas */}
          <div style={{ flex: 1 }}>
            <ReactFlow
              nodes={nodes}
              edges={edges}
              onNodesChange={onNodesChange}
              onEdgesChange={onEdgesChange}
              onDragOver={onDragOver}
              onDrop={onDrop}
              onConnect={onConnect}
              nodeTypes={nodeTypes}
              fitView
            >
              <Controls />
              <Background />
            </ReactFlow>
          </div>

          {/* Right sidebar: property editor */}
          <aside style={{ width: 200, background: '#fafafa', borderLeft: '1px solid #ccc', padding: 10 }}>
            <h3>Properties</h3>
            {selectedNode ? (
              <div>
                <p><strong>ID:</strong> {selectedNode.id}</p>
                <label>X:</label>
                <input
                  type="number"
                  value={Math.round(selectedNode.position.x)}
                  onChange={(e) => updateNodePosition(selectedNode.id, 'x', e.target.value)}
                  style={{ width: '100%' }}
                />
                <br /><br />
                <label>Y:</label>
                <input
                  type="number"
                  value={Math.round(selectedNode.position.y)}
                  onChange={(e) => updateNodePosition(selectedNode.id, 'y', e.target.value)}
                  style={{ width: '100%' }}
                />
              </div>
            ) : (
              <p style={{ color: '#999' }}>Click a node to edit</p>
            )}
          </aside>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ReactFlowProvider>
        <App />
      </ReactFlowProvider>
    );
  </script>
</body>
</html>
